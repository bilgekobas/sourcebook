<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sourcebook — Open Data for Built Environment & Climate Research</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Crimson+Pro:wght@400;500;600&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {--paper:#F3F3F3;--paper2:#e9e9e9;--ink:#18181b;--ink2:#52504c;--ink3:#8d8d8d;--rule:#cecece;--rule2:#dedede;--accent:#3D00F5;--white:#fafafa;}
*{box-sizing:border-box} body{margin:0;background:var(--paper);color:var(--ink);font-family:'Crimson Pro',serif;font-size:17px;line-height:1.55;overflow-x:hidden} button,select,input{font:inherit} .mono{font-family:'IBM Plex Mono',monospace} a{color:inherit} a:hover{opacity:.75}
.header{position:sticky;top:0;z-index:100;background:var(--paper);border-bottom:2px solid var(--ink)}
.header-inner{max-width:1100px;margin:0 auto;padding:28px 48px 24px;display:flex;justify-content:space-between;gap:28px;align-items:flex-end;flex-wrap:wrap}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);letter-spacing:.15em;text-transform:uppercase}
h1{font-family:'Cormorant Garamond',serif;font-size:38px;line-height:1;margin:8px 0 10px;font-weight:600} .accent{color:var(--accent)}
.subtitle{max-width:560px;margin:0 0 14px;color:var(--ink2);font-size:17px} .dotted{color:var(--accent);border-bottom:1px dashed var(--accent)}
.author{padding-top:14px;border-top:1px solid var(--rule2);max-width:560px} .author .name{font-size:12px;letter-spacing:.03em} .author .affil{font-size:10px;color:var(--ink3);letter-spacing:.04em;line-height:1.7}
.stats{display:flex;gap:24px;justify-content:flex-end;align-items:flex-end;flex-wrap:wrap} .stat{text-align:right} .stat b{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;line-height:1;display:block} .stat span{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase} .stat.new b{color:var(--accent)}
.top-buttons{display:flex;gap:8px;justify-content:flex-end;margin-top:12px} .btn{background:var(--ink);color:var(--paper);border:1px solid var(--ink);padding:8px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.07em;cursor:pointer} .btn.accent{background:var(--accent);border-color:var(--accent);color:white} .btn.ghost{background:transparent;color:var(--ink)}
main{max-width:1100px;margin:0 auto;padding:40px 48px}
.accordion{background:var(--ink);color:var(--paper);border:1px solid var(--ink);margin-bottom:12px} .acc-head{width:100%;background:transparent;color:var(--paper);border:none;padding:16px 18px;display:flex;justify-content:space-between;text-align:left;cursor:pointer} .acc-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;line-height:1.1} .acc-sub{font-size:16px;opacity:.9} .acc-content{background:var(--paper);color:var(--ink);padding:22px;border-top:1px solid var(--ink)}
.filters{position:sticky;top:270px;z-index:90;background:var(--paper);padding:16px 0 14px;border-bottom:1px solid var(--rule2);box-shadow:0 -40px 0 40px var(--paper)}
.search{width:100%;padding:10px 12px;border:1px solid var(--rule);background:var(--paper);font-size:17px;color:var(--ink);margin-bottom:12px}
.filter-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px} select{width:100%;background:var(--accent);color:white;border:1px solid var(--accent);padding:9px 10px;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em} select option{color:var(--accent);background:var(--paper)}
.active-tags{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px} .filter-chip{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--paper);background:var(--ink2);padding:4px 7px;text-transform:uppercase} .reset{font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--accent);color:#fff;border:1px solid var(--accent);padding:7px 11px;text-transform:uppercase;cursor:pointer}
.count{padding:12px 0;border-bottom:1px solid var(--rule2);font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em}
.entry{position:relative;padding:28px 0 24px 14px;border-bottom:1px solid var(--rule2);border-left:2px solid transparent} .entry.expanded{border-left-color:var(--accent)} .entry-top{display:grid;grid-template-columns:minmax(0,1fr) 180px;gap:20px;cursor:pointer} .cat{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.11em;color:var(--ink3);text-transform:uppercase} .name{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;line-height:1.15;margin:4px 0} .desc{font-size:17px;color:var(--ink2);margin:0 0 10px} .pills{display:flex;gap:6px;flex-wrap:wrap} .pill{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;border:1px solid var(--ink3);color:var(--ink3);padding:1px 6px;background:transparent} .pill.access{color:var(--accent);border-color:var(--accent)}
.rating{display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-top:6px} .rating .label{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.07em;min-width:88px;text-align:right} .bars{display:flex;gap:2px} .bar{width:18px;height:4px;background:var(--rule2)} .bar.on{background:var(--accent)}
.details{margin-top:22px} .questionbox{background:var(--paper2);padding:18px 20px;border-left:2px solid var(--rule);margin-bottom:18px} .questionbox h4,.meta-label{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);font-weight:400;margin:0 0 10px} .questionbox li{margin:6px 0} .meta-grid{display:grid;grid-template-columns:repeat(3,1fr);border:1px solid var(--rule2);margin-bottom:18px} .meta-cell{padding:12px 14px;border-right:1px solid var(--rule2)} .meta-cell:last-child{border-right:0} .meta-val{font-size:16px;color:var(--ink)} .rich-meta{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:14px 0}
.entry-footer{display:flex;justify-content:space-between;gap:12px;align-items:center;border-top:1px solid var(--rule2);padding-top:14px;margin-top:18px;flex-wrap:wrap} .datebox{display:flex;gap:16px;flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--ink3);letter-spacing:.04em} .compare-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;border:1px solid var(--accent);background:transparent;color:var(--accent);padding:5px 8px;text-transform:uppercase;cursor:pointer}
.side-page{background:var(--paper);border-top:1px solid var(--rule2);padding-top:8px} .compare-table{width:100%;border-collapse:collapse;font-size:14px} .compare-table th,.compare-table td{border:1px solid var(--rule2);padding:8px;text-align:left;vertical-align:top} .compare-table th{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;color:var(--ink3);font-weight:400} .ethics{max-width:860px} .ethics h2,.side-page h2{font-family:'Cormorant Garamond',serif;font-size:30px} .ethics h3{font-family:'Cormorant Garamond',serif;font-size:22px;margin-top:28px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);padding:12px 24px;z-index:9999;font-family:'IBM Plex Mono',monospace;font-size:11px;box-shadow:0 4px 20px rgba(0,0,0,.2)}
@media(max-width:900px){.header{position:static}.filters{position:static;box-shadow:none}.header-inner,main{padding-left:24px;padding-right:24px}.filter-grid{grid-template-columns:1fr 1fr}.entry-top{grid-template-columns:1fr}.meta-grid,.rich-meta{grid-template-columns:1fr}}
</style>
</head><body><div id="app"></div>

llite imagery using ML. Particularly strong coverage in Africa, South & Southeast Asia, and Latin America — regions underserved by other datasets.", "url": "https://sites.research.google/open-buildings/", "category": "Urban & Built Environment", "topics": ["Building Footprints", "Urban Morphology", "Informal Settlements"], "costModel": "free", "codingRequired": "optional", "scale": ["Global"], "regions": ["Africa", "Asia", "Latin America"], "temporalCoverage": "2016–2023", "temporalResolution": "Static (versioned releases)", "spatialResolution": "Sub-metre vector polygons", "formats": ["CSV", "GeoJSON", "GeoParquet"], "beginnerRating": 3, "researchQuestions": ["What is the building density across informal settlements in sub-Saharan Africa?", "How does average building size differ between planned and organic urban growth areas?", "Which areas have seen the fastest growth in building count over the past decade?"], "accessModes": ["Direct download"], "dateAdded": "2025-01-01", "researchMaturity": "Exploratory", "spatialAnalysis": ["Raster", "Vector", "Remote sensing", "Building stock"], "requiredTools": ["Browser", "Excel", "QGIS"], "accessFriction": "Instant", "lastModified": "2025-01-01"}, {"id": "seed-5", "name": "Microsoft Planetary Computer", "description": "Microsoft's cloud platform providing petabytes of environmental data — satellite imagery, climate model outputs, land cover, and more — with a free JupyterHub environment and searchable data catalogue.", "url": "https://planetarycomputer.microsoft.com", "category": "Multi-Theme Platform", "topics": ["Satellite Imagery", "Land Cover", "Climate", "Biodiversity"], "costModel": "free", "codingRequired": "required", "scale": ["Global"], "regions": ["Global"], "temporalCoverage": "Varies by dataset", "temporalResolution": "Varies", "spatialResolution": "Up to 10 m", "formats": ["GeoTIFF", "Zarr", "STAC API"], "beginnerRating": 2, "researchQuestions": ["How has land surface temperature changed across a metropolitan region over 20 years?", "What is the extent of impervious surfaces across a river catchment?", "How have vegetation levels changed in peri-urban areas over time?"], "accessModes": ["Direct download", "API"], "dateAdded": "2025-01-01", "researchMaturity": "Established", "spatialAnalysis": ["Raster", "Remote sensing", "Climate model"], "requiredTools": ["Browser", "QGIS", "Python", "GDAL"], "accessFriction": "Cloud platform", "lastModified": "2025-01-01"}, {"id": "seed-6", "name": "WorldClim v2", "description": "Global gridded climate data for historical periods and future projections (CMIP6). Files download directly — no account or coding needed to get started. Widely used for ecological and spatial research.", "url": "https://worldclim.org", "category": "Climate & Atmosphere", "topics": ["Temperature", "Precipitation", "Bioclimatic Variables", "Climate Projections"], "costModel": "free", "codingRequired": "none", "scale": ["Global"], "regions": ["Global"], "temporalCoverage": "1970–2000 (historical); 2021–2100 (future)", "temporalResolution": "Monthly averages", "spatialResolution": "1 km – 10 arcmin (~340 km coarsest)", "formats": ["GeoTIFF"], "beginnerRating": 5, "researchQuestions": ["How will average growing-season temperatures shift under a 2°C warming scenario?", "Which regions are projected to see the largest decline in annual rainfall by 2070?", "How does precipitation seasonality compare between two regions?"], "accessModes": ["Direct download"], "dateAdded": "2025-01-01", "researchMaturity": "Operational", "spatialAnalysis": ["Raster", "Time-series", "Climate model"], "requiredTools": ["Browser", "QGIS", "GDAL"], "accessFriction": "Registration", "lastModified": "2025-01-01"}, {"id": "seed-7", "name": "OpenAQ", "description": "Aggregates real-time and historical air quality data from government monitoring stations worldwide. Accessible via a clean web interface and a free API with good Python library support.", "url": "https://openaq.org", "category": "Air iewer"], "dateAdded": "2025-01-01", "researchMaturity": "Established", "spatialAnalysis": ["Raster", "Vector"], "requiredTools": ["Browser", "QGIS", "GDAL"], "accessFriction": "Registration", "lastModified": "2025-01-01"}, {"id": "seed-9", "name": "Global Power Plant Database", "description": "Open database of ~35,000 power plants worldwide, maintained by WRI. Covers location, capacity, fuel type, and annual generation. Downloads as a single CSV — opens straight in Excel or Python.", "url": "https://datasets.wri.org/dataset/globalpowerplantdatabase", "category": "Energy & Infrastructure", "topics": ["Power Plants", "Energy Capacity", "Fuel Types", "Renewable Energy"], "costModel": "free", "codingRequired": "none", "scale": ["Global"], "regions": ["Global"], "temporalCoverage": "~2013–2022", "temporalResolution": "Annual updates", "spatialResolution": "Point locations (individual plants)", "formats": ["CSV", "Shapefile"], "beginnerRating": 5, "researchQuestions": ["What is the current mix of renewable vs fossil fuel power capacity by country?", "Which countries have the highest share of wind and solar installed capacity?", "How does power plant infrastructure differ between high- and low-income countries?"], "accessModes": ["Direct download"], "dateAdded": "2025-01-01", "researchMaturity": "Established", "spatialAnalysis": ["Vector", "Time-series"], "requiredTools": ["Browser", "Excel", "QGIS", "Python", "PostGIS"], "accessFriction": "Technical setup", "lastModified": "2025-01-01"}, {"id": "seed-10", "name": "NASA Earthdata / SEDAC", "description": "NASA's Earth science data portal, including SEDAC (Socioeconomic Data and Applications Center). Hosts gridded population, urban extents, natural hazards exposure, and climate vulnerability indices.", "url": "https://earthdata.nasa.gov", "category": "Multi-Theme Platform", "topics": ["Population Grids", "Urban Extents", "Natural Hazards", "Satellite Imagery", "Climate Vulnerability"], "costModel": "free", "codingRequired": const FILTERS={cats:["Air Quality & Pollution", "Building Energy & Performance", "Climate & Atmosphere", "Climate Hazards & Risk", "Energy & Infrastructure", "Land Use & Land Cover", "Multi-Theme Platform", "Social & Demographic", "Transport & Mobility", "Urban & Built Environment"],scales:["Continental", "Global", "Local", "National", "Regional", "Sub-national"],access:["API", "Direct download", "Viewer"],spatial:["Building stock", "Census/socioeconomic", "Climate model", "Network", "Point observations", "Raster", "Remote sensing", "Simulation-ready", "Tabular", "Time-series", "Vector"],tools:["Browser", "Earth Engine", "Excel", "GDAL", "PostGIS", "Python", "QGIS"],frictions:["Cloud platform", "Instant", "Registration", "Technical setup"],maturity:["Established", "Exploratory", "Operational"]};
const $=s=>document.querySelector(s); const app=$('#app');
let state={mode:'catalogue',search:'',category:'',scale:'',access:'',spatial:'',tool:'',friction:'',maturity:'',sort:'default',expanded:null,compare:[]};
const q=(s)=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function ratingLabel(r){return ['','Expert only','Advanced','Moderate','Easy','Very easy'][r]||''}
function bars(r){return `<div class="rating"><span class="label">${q(ratingLabel(r))}</span><span class="bars">${[1,2,3,4,5].map(i=>`<span class="bar ${i<=r?'on':''}"></span>`).join('')}</span></div>`}
function pill(x,cls=''){return `<span class="pill ${cls}">${q(x)}</span>`}
function select(id,label,opts){return `<select id="${id}"><option value="">${label}</option>${opts.map(o=>`<option value="${q(o)}" ${state[id]===o?'selected':''}>${q(o)}</option>`).join('')}</select>`}
function filtered(){let out=DATA.filter(e=>{let s=state.search.toLowerCase(); if(s&&!([e.name,e.description,e.category,...(e.topics||[]),...(e.researchQuestions||[])].join(' ').toLowerCase().includes(s)))return false; if(state.category&&e.category!==state.category)return false; if(state.scale&&!(e.scale||[]).includes(state.scale))return false; if(state.access&&!(e.accessModes||[]).includes(state.access))return false; if(state.spatial&&!(e.spatialAnalysis||[]).includes(state.spatial))return false; if(state.tool&&!(e.requiredTools||[]).includes(state.tool))return false; if(state.friction&&e.accessFriction!==state.friction)return false; if(state.maturity&&e.researchMaturity!==state.maturity)return false; return true;});
 if(state.sort==='az')out.sort((a,b)=>a.name.localeCompare(b.name)); if(state.sort==='rating')out.sort((a,b)=>(b.beginnerRating||3)-(a.beginnerRating||3)); if(state.sort==='resolution')out.sort((a,b)=>String(a.spatialResolution).localeCompare(String(b.spatialResolution))); if(state.sort==='maturity')out.sort((a,b)=>a.researchMaturity.localeCompare(b.researchMaturity)); return out;}
function header(){let free=DATA.filter(e=>e.costModel==='free').length, no=DATA.filter(e=>e.codingRequired==='none').length, newer=DATA.filter(e=>new Date(e.dateAdded)>new Date(Date.now()-60*24*3600*1000)).length; return `<header class="header"><div class="header-inner"><div><div class="eyebrow">Built Environment & Climate Research</div><h1><span class="accent">Source</span>book</h1><p class="subtitle">A curated catalogue of open datasets for built environment and climate research. <span class="dotted">Hover red terms</span> for plain-English definitions.</p><div class="author"><div class="mono name">Bilge Kobas</div><div class="mono affil">Technical University of Munich, Chair of Building Technology and Climate-Responsive Design</div></div></div><div><div class="stats"><div class="stat"><b>${DATA.length}</b><span>entries</span></div><div class="stat"><b>${free}</b><span>fully free</span></div><div class="stat"><b>${no}</b><span>no coding</span></div><div class="stat new"><b>${newer}</b><span>new</span></div></div><div class="top-buttons"><button class="btn" onclick="exportCSV()">↓ Export CSV</button><button class="btn" onclick="toast('Kobas, B. (2026). Sourcebook: Open data knowledge base for built environment and climate research.')">How to cite</button><button class="btn" onclick="state.mode='ethics';render()">Bias & Ethics</button><button class="btn" onclick="state.mode='compare';render()">Compare (${state.compare.length})</button></div></div></div></header>`}
function filters(){let active=['category','scale','access','spatial','tool','friction','maturity'].filter(k=>state[k]); return `<section class="filters"><input id="search" class="search" placeholder="Search by name, topic, research question…" value="${q(state.search)}"/><div class="filter-grid">${select('category','All categories',FILTERS.cats)}${select('access','Access mode',FILTERS.access)}${select('spatial','Spatial type',FILTERS.spatial)}${select('tool','Required tool',FILTERS.tools)}${select('scale','Scale',FILTERS.scales)}${select('friction','Access friction',FILTERS.frictions)}${select('maturity','Research maturity',FILTERS.maturity)}<select id="sort"><option value="default">Default order</option><option value="az" ${state.sort==='az'?'selected':''}>A → Z</option><option value="rating" ${state.sort==='rating'?'selected':''}>Best for beginners</option><option value="resolution" ${state.sort==='resolution'?'selected':''}>Spatial resolution</option><option value="maturity" ${state.sort==='maturity'?'selected':''}>Research maturity</option></select><button class="reset" onclick="resetFilters()">Reset filters</button></div><div class="active-tags">${active.map(k=>`<span class="filter-chip">${k}: ${q(state[k])}</span>`).join('')}</div></section>`}
function entry(e){let ex=state.expanded===e.id; return `<article class="entry ${ex?'expanded':''}"><div class="entry-top" onclick="state.expanded=state.expanded==='${e.id}'?null:'${e.id}';render()"><div><div class="cat">${q(e.category)}</div><div class="name">${q(e.name)}</div><p class="desc">${q(e.description)}</p><div class="pills">${pill(e.costModel||'free')}${pill('code '+(e.codingRequired||'optional'))}${(e.accessModes||[]).map(x=>pill(x,'access')).join('')}${(e.scale||[]).slice(0,3).map(x=>pill(x)).join('')}</div></div>${bars(e.beginnerRating||3)}</div>${ex?details(e):''}</article>`}
function details(e){return `<div class="details"><div class="questionbox"><h4>Good for answering questions like…</h4><ul>${(e.researchQuestions||[]).map(x=>`<li>${q(x)}</li>`).join('')}</ul></div><div class="meta-grid"><div class="meta-cell"><div class="meta-label">Coverage</div><div class="meta-val">${q(e.temporalCoverage)}</div></div><div class="meta-cell"><div class="meta-label">Temporal res.</div><div class="meta-val">${q(e.temporalResolution)}</div></div><div class="meta-cell"><div class="meta-label">Spatial res.</div><div class="meta-val">${q(e.spatialResolution)}</div></div></div><div class="rich-meta"><div><div class="meta-label">Methodological metadata</div><div class="pills">${pill(e.researchMaturity,'access')}${pill(e.accessFriction,'access')}${(e.spatialAnalysis||[]).map(x=>pill(x)).join('')}</div></div><div><div class="meta-label">Typical tools</div><div class="pills">${(e.requiredTools||[]).map(x=>pill(x)).join('')}</div></div><div><div class="meta-label">Formats</div><div>${(e.formats||[]).join(' · ')}</div></div><div><div class="meta-label">Topics</div><div>${(e.topics||[]).join(' · ')}</div></div></div><div class="entry-footer"><a href="${q(e.url)}" target="_blank" rel="noopener">${q(e.url.replace(/^https?:\/\//,'').split('/')[0])} ↗</a><button class="compare-btn" onclick="event.stopPropagation();toggleCompare('${e.id}')">${state.compare.includes(e.id)?'Remove from compare':'Add to compare'}</button><div class="datebox"><span>Submitted: ${q(e.dateAdded||'—')}</span><span>Last modified: ${q(e.lastModified||e.dateAdded||'—')}</span></div></div></div>`}
function catalogue(){let f=filtered(); return `<main><div class="accordion"><button class="acc-head"><div><div class="acc-title">New to research data?</div><div class="acc-sub">Find your first dataset in 3 steps.</div></div><span class="mono">Expand ↓</span></button></div><div class="accordion"><button class="acc-head"><div><div class="acc-title">Want to contribute a dataset?</div><div class="acc-sub">Learn how to submit a source to Sourcebook.</div></div><span class="mono">Expand ↓</span></button></div>${filters()}<div class="count">${f.length} entries of ${DATA.length} total</div>${f.map(entry).join('')}</main>`}
function comparePage(){let rows=DATA.filter(e=>state.compare.includes(e.id)); if(!rows.length) rows=filtered().slice(0,6); let cols=['category','spatialResolution','temporalResolution','temporalCoverage','accessModes','accessFriction','researchMaturity','spatialAnalysis','requiredTools']; return `<main class="side-page"><button class="btn ghost" onclick="state.mode='catalogue';render()">← Catalogue</button><h2>Compare datasets</h2><p class="subtitle">Select datasets from the catalogue, or compare the current filtered subset. The table is intentionally methodological rather than visual.</p><table class="compare-table"><thead><tr><th>Dataset</th>${cols.map(c=>`<th>${c.replace(/([A-Z])/g,' $1')}</th>`).join('')}</tr></thead><tbody>${rows.map(e=>`<tr><td><b>${q(e.name)}</b></td>${cols.map(c=>`<td>${q(Array.isArray(e[c])?e[c].join(', '):e[c]||'—')}</td>`).join('')}</tr>`).join('')}</tbody></table></main>`}
function ethicsPage(){return `<main class="side-page ethics"><button class="btn ghost" onclick="state.mode='catalogue';render()">← Catalogue</button><h2>Bias & Ethics</h2><p>Open spatial and climate datasets are not neutral descriptions of the world. Their coverage, categories, temporal continuity, institutional origin, and access conditions shape what researchers are able to see.</p><h3>Geographic unevenness</h3><p>Global datasets often have weaker ground validation, lower completeness, or coarser proxies in regions with limited monitoring infrastructure.</p><h3>Crowdsourcing bias</h3><p>Volunteer datasets such as OpenStreetMap reflect uneven mapping cultures, language communities, and socioeconomic capacities.</p><h3>Remote sensing limitations</h3><p>Cloud cover, revisit frequency, sensor resolution, classification models, and surface/air-temperature differences can strongly affect interpretation.</p><h3>Institutional definitions</h3><p>Settlement, vulnerability, land-cover, or building-stock categories may encode assumptions from the producing institution and may not align with local urban realities.</p><h3>Good practice</h3><p>Report data provenance, access mode, spatial and temporal resolution, uncertainty, missingness, and whether the dataset is being used for exploration, operational assessment, or policy argumentation.</p></main>`}
function render(){app.innerHTML=header()+(state.mode==='compare'?comparePage():state.mode==='ethics'?ethicsPage():catalogue())+`<div id="toast" class="toast" style="display:none"></div>`; bind();}
function bind(){let s=$('#search'); if(s) s.oninput=e=>{state.search=e.target.value;render()}; ['category','scale','access','spatial','tool','friction','maturity','sort'].forEach(id=>{let el=$('#'+id); if(el) el.onchange=e=>{state[id]=e.target.value;render()}})}
function resetFilters(){Object.assign(state,{search:'',category:'',scale:'',access:'',spatial:'',tool:'',friction:'',maturity:'',sort:'default'});render()}
function toggleCompare(id){state.compare=state.compare.includes(id)?state.compare.filter(x=>x!==id):[...state.compare,id];render()}
function toast(msg){let t=$('#toast'); t.textContent=msg; t.style.display='block'; setTimeout(()=>t.style.display='none',5000)}
function exportCSV(){let rows=filtered(); let headers=['name','category','url','accessModes','accessFriction','researchMaturity','spatialAnalysis','requiredTools','spatialResolution','temporalResolution']; let csv=[headers.join(','),...rows.map(e=>headers.map(h=>'"'+String(Array.isArray(e[h])?e[h].join('; '):e[h]||'').replace(/"/g,'""')+'"').join(','))].join('
'); let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download='sourcebook_filtered.csv'; a.click();}
render();
</script></body></html>
