<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sourcebook — Open Data for Built Environment & Climate Research</title>
    <meta name="description" content="A curated catalogue of open datasets for built environment and climate research. Compiled by Bilge Kobas, Chair of Building Technology and Climate-Responsive Design, TU Munich." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #F3F3F3; }
      select option { background: #F3F3F3; }
    </style>
    <script type="module" crossorigin src="/sourcebook/assets/index-sourcebook-final-v17.js"></script>
  
<style>
  select option { color: #3D00F5 !important; background: #F3F3F3 !important; }
  select option:checked, select option:hover { color: #3D00F5 !important; background: #edeae2 !important; }
  @media (max-width: 900px) {
    header { position: static !important; }
  }
</style>

    <script>
      (function(){
        function setSourcebookStickyTop(){
          var header = document.querySelector('header');
          if (!header) return;
          var h = Math.ceil(header.getBoundingClientRect().height);
          document.documentElement.style.setProperty('--sourcebook-sticky-top', (h + 4) + 'px');
        }
        window.addEventListener('load', setSourcebookStickyTop);
        window.addEventListener('resize', setSourcebookStickyTop);
        document.addEventListener('DOMContentLoaded', setSourcebookStickyTop);
        setTimeout(setSourcebookStickyTop, 250);
        setTimeout(setSourcebookStickyTop, 1000);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
